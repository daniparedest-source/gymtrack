<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GymTrack"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>GymTrack</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0d;--s1:#161616;--s2:#1f1f1f;--s3:#282828;
  --border:#2e2e2e;--border2:#3a3a3a;
  --accent:#c8f135;--accent2:#ff6b35;--accent3:#818cf8;
  --text:#f2f2f2;--dim:#999;--muted:#555;
  --ok:#4ade80;--warn:#fbbf24;--danger:#f87171;
  --r:14px;--rs:8px;--rx:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100dvh}

/* ── BOTTOM NAV ── */
.nav{display:flex;background:var(--s1);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:90;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:color .2s}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb.active{color:var(--accent)}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow-y:auto;padding:16px 16px calc(80px + env(safe-area-inset-bottom));padding-top:60px}
.screen.on{display:block}

/* ── TOP BAR ── */
.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:89;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em}
.topbar-title span{color:var(--accent)}
.topbar-actions{display:flex;gap:8px}

/* ── TYPOGRAPHY ── */
.h1{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;letter-spacing:.03em}
.h1 span{color:var(--accent)}
.h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em}
.h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em}
.label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.caption{font-size:12px;color:var(--dim)}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-sm{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:8px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:var(--rs);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#0d0d0d}
.btn-primary:active{background:#b5d92f}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;border-radius:var(--rs)}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;background:var(--s2);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rx);padding:3px 10px;font-size:11px;color:var(--dim);white-space:nowrap}
.tag.green{background:rgba(200,241,53,.1);border-color:rgba(200,241,53,.3);color:var(--accent)}
.tag.orange{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--accent2)}
.tag.purple{background:rgba(129,140,248,.1);border-color:rgba(129,140,248,.3);color:var(--accent3)}

/* ── INPUTS ── */
.input{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input-sm{padding:8px 10px;font-size:14px;text-align:center;-webkit-appearance:none}
.input-sm.done{border-color:rgba(200,241,53,.4);background:rgba(200,241,53,.05)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap .input{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
select.input{-webkit-appearance:none}

/* ── DIVIDERS ── */
.divider{height:1px;background:var(--border);margin:16px 0}
.section{margin-bottom:20px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

/* ── HOME STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1}
.stat-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ── ROUTINE CARDS ── */
.routine-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.routine-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.routine-card.A::before{background:var(--accent)}
.routine-card.B::before{background:var(--accent2)}
.routine-card.INF::before{background:var(--accent3)}
.routine-card:active{transform:scale(.98)}
.routine-card-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.routine-card.A .routine-card-label{color:var(--accent)}
.routine-card.B .routine-card-label{color:var(--accent2)}
.routine-card.INF .routine-card-label{color:var(--accent3)}
.routine-card-name{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1.05;margin-bottom:10px}
.routine-card-meta{display:flex;flex-wrap:wrap;gap:6px}
.routine-card-actions{display:flex;gap:8px;margin-top:12px}

/* ── SESSION ── */
.session-bar{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.session-timer-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);line-height:1}

.ex-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.ex-block-head{padding:14px 16px;border-bottom:1px solid var(--border)}
.ex-block-name{font-weight:600;font-size:15px}
.ex-block-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.ex-block-ref{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}

.series-wrap{padding:12px 16px}
.series-head-row{display:grid;grid-template-columns:28px 1fr 1fr 40px 36px;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.series-head-row span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center}
.series-row{display:grid;grid-template-columns:28px 1fr 1fr 40px 36px;gap:6px;align-items:center;margin-bottom:8px}
.series-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);text-align:center}
.unit-toggle{font-size:10px;color:var(--accent);text-align:center;cursor:pointer;font-weight:600;letter-spacing:.04em}
.check-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.check-btn.on{background:var(--accent);border-color:var(--accent);color:#0d0d0d}

.prev-row{background:rgba(200,241,53,.04);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px}
.prev-row .label{flex-shrink:0}
.prev-chips{display:flex;gap:6px;flex-wrap:wrap}
.prev-chip{background:var(--s2);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--dim)}
.prev-chip strong{color:var(--accent)}

/* ── REST OVERLAY ── */
.rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.rest-overlay.on{display:flex}
.rest-ring{position:relative;width:200px;height:200px}
.rest-ring svg{transform:rotate(-90deg)}
.rest-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rest-val{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--accent);line-height:1}
.rest-lbl{font-size:11px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-head{text-align:center;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.06em;padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:500;position:relative;cursor:default}
.cal-day.other{color:var(--muted)}
.cal-day.today{color:var(--accent);font-weight:700}
.cal-day.trained{background:var(--s2);border:1px solid var(--border)}
.cal-day.trained::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--dot-color,var(--accent))}
.cal-legend{display:flex;gap:12px;justify-content:center;margin-top:12px}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim)}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}

/* ── HISTORY ── */
.hist-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.hist-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-body{display:none;border-top:1px solid var(--border)}
.hist-body.on{display:block}
.hist-ex{padding:12px 16px;border-bottom:1px solid var(--border)}
.hist-ex:last-child{border-bottom:none}
.hist-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.hist-chip{background:var(--s2);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--dim)}
.hist-chip strong{color:var(--text)}

/* ── LIBRARY ── */
.pill-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.pill-scroll::-webkit-scrollbar{display:none}
.pill{background:var(--s2);border:1px solid var(--border);border-radius:var(--rx);padding:6px 14px;font-size:12px;white-space:nowrap;cursor:pointer;transition:all .15s;color:var(--dim);flex-shrink:0}
.pill.on{background:rgba(200,241,53,.12);border-color:rgba(200,241,53,.4);color:var(--accent)}

.ex-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.ex-item-body{flex:1;min-width:0}
.ex-item-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-item-sub{font-size:12px;color:var(--dim);margin-top:2px}
.ex-item-actions{display:flex;gap:6px;flex-shrink:0}

/* ── VOLUME TABLE ── */
.vol-muscle{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.vol-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.vol-head-name{font-weight:600;font-size:15px}
.vol-body{display:none;border-top:1px solid var(--border);padding:14px 16px}
.vol-body.on{display:block}
.vol-ranges{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.vol-range{background:var(--s2);border-radius:var(--rs);padding:10px}
.vol-range-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.vol-range-lbl.maint{color:#60a5fa}
.vol-range-lbl.min{color:var(--ok)}
.vol-range-lbl.adapt{color:var(--warn)}
.vol-range-lbl.max{color:var(--danger)}
.vol-range-val{font-family:'Bebas Neue',sans-serif;font-size:20px}
.vol-note{font-size:12px;color:var(--dim);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* ── PROGRESS ── */
.chart-wrap{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:90px}
.chart-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;background:rgba(200,241,53,.15);transition:height .4s}
.chart-bar.latest{background:var(--accent)}
.chart-bar-val{font-size:9px;color:var(--muted)}
.chart-date{font-size:9px;color:var(--muted);text-align:center}

/* ── ROUTINE BUILDER ── */
.builder-ex{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.builder-ex-body{flex:1;min-width:0}
.builder-ex-name{font-weight:600;font-size:14px}
.builder-ex-meta{font-size:12px;color:var(--dim);margin-top:3px}
.builder-ex-controls{display:flex;align-items:center;gap:8px;margin-top:10px}
.builder-ex-controls input{width:60px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;text-align:center;outline:none}
.builder-ex-controls input:focus{border-color:var(--accent)}

/* ── WEEKLY CALCULATOR ── */
.week-calc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.week-calc-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.week-calc-row:last-child{border-bottom:none}
.week-calc-muscle{flex:1;font-size:13px;font-weight:500}
.week-calc-val{font-family:'Bebas Neue',sans-serif;font-size:22px;width:48px;text-align:right}
.week-calc-bar{flex:2;height:6px;background:var(--s3);border-radius:3px;margin:0 10px;overflow:hidden}
.week-calc-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.week-calc-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
.badge-maint{background:rgba(96,165,250,.15);color:#60a5fa}
.badge-min{background:rgba(74,222,128,.15);color:var(--ok)}
.badge-adapt{background:rgba(251,191,36,.15);color:var(--warn)}
.badge-max{background:rgba(248,113,113,.15);color:var(--danger)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:flex-end}
.modal-overlay.on{display:flex}
.modal{background:var(--s1);border-radius:20px 20px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:16px}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 16px;color:var(--muted)}
.empty .ico{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* ── UTILS ── */
.flex{display:flex}.gap-8{gap:8px}.gap-6{gap:6px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-12{margin-bottom:12px}
.row{display:flex;align-items:center}.row-sb{display:flex;align-items:center;justify-content:space-between}
.w-full{width:100%}.text-accent{color:var(--accent)}.font-bold{font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">GYM<span>TRACK</span></div>
  <div class="topbar-actions">
    <button class="btn-icon" onclick="openExport()" title="Exportar datos">📤</button>
    <button class="btn-icon" onclick="openImport()" title="Importar datos">📥</button>
  </div>
</div>

<!-- SCREENS -->
<div class="screen on" id="sc-home"></div>
<div class="screen" id="sc-routines"></div>
<div class="screen" id="sc-workout"></div>
<div class="screen" id="sc-history"></div>
<div class="screen" id="sc-library"></div>
<div class="screen" id="sc-reference"></div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nb active" id="nb-home" onclick="nav('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </button>
  <button class="nb" id="nb-routines" onclick="nav('routines')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Rutinas
  </button>
  <button class="nb" id="nb-history" onclick="nav('history')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Historial
  </button>
  <button class="nb" id="nb-library" onclick="nav('library')">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Biblioteca
  </button>
  <button class="nb" id="nb-reference" onclick="nav('reference')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Referencia
  </button>
</nav>

<!-- REST OVERLAY -->
<div class="rest-overlay" id="rest-overlay">
  <div class="rest-ring">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="88" fill="none" stroke="#1f1f1f" stroke-width="8"/>
      <circle cx="100" cy="100" r="88" fill="none" stroke="#c8f135" stroke-width="8"
        stroke-linecap="round" id="rest-arc"
        stroke-dasharray="553" stroke-dashoffset="0"/>
    </svg>
    <div class="rest-ring-center">
      <div class="rest-val" id="rest-val">90</div>
      <div class="rest-lbl">Descanso</div>
    </div>
  </div>
  <button class="btn btn-ghost btn-sm" style="width:160px" onclick="skipRest()">Saltar ›</button>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════

function load(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function getSessions(){return load('gt_sessions',[])}
function saveSession(s){const a=getSessions();a.unshift(s);save('gt_sessions',a)}
function getRoutines(){
  const saved=load('gt_routines',null);
  if(!saved)return JSON.parse(JSON.stringify(DEFAULT_ROUTINES));
  return saved;
}
function saveRoutines(r){save('gt_routines',r)}
function getCustomExercises(){return load('gt_custom_ex',[])}
function saveCustomExercises(e){save('gt_custom_ex',e)}
function getAllExercises(){return [...DB_EXERCISES,...getCustomExercises()]}

// NAVIGATION
// ═══════════════════════════════════════════
function nav(screen){
  if(screen==='workout'&&!activeSession){nav('routines');return}
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('sc-'+screen).classList.add('on');
  const nb=document.getElementById('nb-'+screen);
  if(nb)nb.classList.add('active');
  currentScreen=screen;
  render();
}

function render(){
  if(currentScreen==='home') renderHome();
  else if(currentScreen==='routines') renderRoutines();
  else if(currentScreen==='workout') renderWorkout();
  else if(currentScreen==='history') renderHistory();
  else if(currentScreen==='library') renderLibrary();
  else if(currentScreen==='reference') renderReference();
}

function startWorkout(routineId){
  const routine=getRoutines().find(r=>r.id===routineId);
  if(!routine)return;
  const sessions=getSessions();
  const lastSame=sessions.find(s=>s.routineId===routineId);
  activeSession={
    routineId,
    routineName:routine.name,
    date:new Date().toISOString(),
    exercises:routine.exercises.map(ex=>({
      name:ex.name,
      pattern:ex.pattern,
      note:ex.note||'',
      rir:ex.rir||'',
      repsTarget:ex.reps,
      rest:ex.rest||90,
      unit:load(`unit_${ex.name}`,'kg'),
      sets:Array.from({length:ex.sets},()=>({kg:'',reps:'',done:false})),
      prev:lastSame?(lastSame.exercises.find(e=>e.name===ex.name)||null):null
    }))
  };
  sessionStart=Date.now();
  if(sessionTick)clearInterval(sessionTick);
  sessionTick=setInterval(()=>{
    const el=document.getElementById('session-elapsed');
    if(el)el.textContent=fmtTimer(Date.now()-sessionStart);
  },1000);
  nav('workout');
}

function getExUrl(name){
  const ex=DB_EXERCISES.find(e=>e.name.toLowerCase()===name.toLowerCase());
  return ex?ex.url:'';
}

function setVal(ei,si,field,val){
  if(!activeSession)return;
  activeSession.exercises[ei].sets[si][field]=val;
}

function toggleUnit(ei){
  if(!activeSession)return;
  const ex=activeSession.exercises[ei];
  ex.unit=ex.unit==='kg'?'lbs':'kg';
  save(`unit_${ex.name}`,ex.unit);
  renderWorkout();
}

function toggleDone(ei,si){
  if(!activeSession)return;
  const set=activeSession.exercises[ei].sets[si];
  const kgEl=document.getElementById(`kg-${ei}-${si}`);
  const rpEl=document.getElementById(`rp-${ei}-${si}`);
  if(kgEl)set.kg=kgEl.value;
  if(rpEl)set.reps=rpEl.value;
  set.done=!set.done;
  const btn=document.querySelector(`#srow-${ei}-${si} .check-btn`);
  if(btn){btn.classList.toggle('on',set.done)}
  if(kgEl)kgEl.classList.toggle('done',set.done);
  if(rpEl)rpEl.classList.toggle('done',set.done);
  if(set.done)startRest(activeSession.exercises[ei].rest);
}

function finishWorkout(){
  if(!activeSession)return;
  clearInterval(sessionTick);
  const dur=Math.round((Date.now()-sessionStart)/60000);
  const sess={
    routineId:activeSession.routineId,
    routineName:activeSession.routineName,
    date:activeSession.date,
    duration:dur,
    totalSets:activeSession.exercises.reduce((a,e)=>a+e.sets.length,0),
    exercises:activeSession.exercises.map(ex=>({
      name:ex.name,
      pattern:ex.pattern,
      unit:ex.unit,
      sets:ex.sets.map(s=>({kg:s.kg,reps:s.reps,done:s.done}))
    }))
  };
  saveSession(sess);
  activeSession=null;
  sessionStart=null;
  nav('home');
}

function cancelWorkout(){
  if(!confirm('¿Cancelar sesión? No se guardará.'))return;
  clearInterval(sessionTick);
  activeSession=null;
  nav('routines');
}

// ═══════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════
function startRest(sec){
  restTotal=sec; restLeft=sec;
  document.getElementById('rest-overlay').classList.add('on');
  updRest();
  if(restInterval)clearInterval(restInterval);
  restInterval=setInterval(()=>{
    restLeft--;
    if(restLeft<=0){skipRest();return}
    updRest();
  },1000);
}
function updRest(){
  document.getElementById('rest-val').textContent=restLeft;
  const arc=document.getElementById('rest-arc');
  const total=553;
  arc.style.strokeDashoffset=total*(1-restLeft/restTotal);
}
function skipRest(){
  clearInterval(restInterval);
  document.getElementById('rest-overlay').classList.remove('on');
}

// HISTORY
// ═══════════════════════════════════════════
function renderHistory(){
  const sessions=getSessions();
  const routines=getRoutines();
  const el=document.getElementById('sc-history');

  // Build dynamic color palette for routines
  const PALETTE=['#c8f135','#ff6b35','#818cf8','#34d399','#f59e0b','#60a5fa','#f472b6','#a78bfa','#fb923c','#22d3ee','#4ade80','#e879f9','#facc15','#38bdf8','#f87171','#a3e635'];
  const routineColors={};
  routines.forEach((r,i)=>{routineColors[r.id]=r.color||PALETTE[i%PALETTE.length]});

  const y=calYear,m=calMonth;
  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const dayMap={};
  sessions.forEach(s=>{
    const d=new Date(s.date);
    if(d.getFullYear()===y&&d.getMonth()===m){
      const k=d.getDate();
      if(!dayMap[k])dayMap[k]=[];
      dayMap[k].push(s.routineId);
    }
  });

  let calCells='';
  for(let i=0;i<first;i++)calCells+=`<div class="cal-day other"></div>`;
  const todayD=new Date().getDate(),todayM=new Date().getMonth(),todayY=new Date().getFullYear();
  for(let d=1;d<=days;d++){
    const isToday=d===todayD&&m===todayM&&y===todayY;
    const rids=dayMap[d]||[];
    const trained=rids.length>0;
    const multi=rids.length>1;
    const color=trained?(routineColors[rids[0]]||'#c8f135'):'';
    const dotStyle=trained?`style="--dot-color:${multi?'linear-gradient(90deg,'+PALETTE[0]+','+PALETTE[1]+')':color}"`:'' ;
    calCells+=`
      <div class="cal-day${isToday?' today':''}${trained?' trained':''}" ${dotStyle}>
        ${d}
      </div>`;
  }

  // dynamic legend
  const legendHTML=routines.map((r,i)=>`
    <div class="cal-legend-item">
      <div class="cal-legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div>
      ${r.name}
    </div>
  `).join('');

  // Session list
  let histHTML='';
  if(!sessions.length){
    histHTML=`<div class="empty"><div class="ico">📭</div><p>Aún no hay sesiones.<br>¡Empieza a entrenar!</p></div>`;
  } else {
    histHTML=sessions.map((s,i)=>`
      <div class="hist-item">
        <div class="hist-head" onclick="toggleHist(${i})">
          <div>
            <div class="font-bold">${s.routineName}</div>
            <div class="caption">${fmtDate(s.date)} · ${s.totalSets} series · ${s.duration||'?'} min</div>
          </div>
          <span style="color:var(--muted);font-size:20px" id="harr-${i}">›</span>
        </div>
        <div class="hist-body" id="hbody-${i}">
          ${s.exercises.map(ex=>`
            <div class="hist-ex">
              <div class="font-bold" style="font-size:13px">${ex.name}</div>
              <div class="hist-chips">
                ${ex.sets.map((st,si)=>`
                  <div class="hist-chip">S${si+1}: <strong>${st.kg||'—'}${ex.unit||'kg'} × ${st.reps||'—'}</strong></div>
                `).join('')}
              </div>
            </div>
          `).join('')}
          <div style="padding:12px 16px">
            <button class="btn btn-danger btn-sm" onclick="deleteSession(${i})">Eliminar sesión</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  el.innerHTML=`
    <div class="fade-up">
      <div style="margin-bottom:20px"><div class="h1">HISTO<span>RIAL</span></div></div>

      <div class="card" style="margin-bottom:20px">
        <div class="cal-nav">
          <button class="btn-icon" onclick="calShift(-1)">‹</button>
          <div class="cal-month">${monthNames[m]} ${y}</div>
          <button class="btn-icon" onclick="calShift(1)">›</button>
        </div>
        <div class="cal-grid">
          ${['D','L','M','M','J','V','S'].map(d=>`<div class="cal-day-head">${d}</div>`).join('')}
          ${calCells}
        </div>
        <div class="cal-legend" style="flex-wrap:wrap">
          ${legendHTML}
        </div>
      </div>

      <div class="label" style="margin-bottom:10px">Sesiones registradas</div>
      ${histHTML}
    </div>
  `;
}

function calShift(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  renderHistory();
}

function toggleHist(i){
  const b=document.getElementById(`hbody-${i}`);
  const a=document.getElementById(`harr-${i}`);
  b.classList.toggle('on');
  a.textContent=b.classList.contains('on')?'⌄':'›';
}

function deleteSession(i){
  if(!confirm('¿Eliminar esta sesión?'))return;
  const sessions=getSessions();
  sessions.splice(i,1);
  save('gt_sessions',sessions);
  renderHistory();
}

function renderWeeklyVolSection(){
  const routines=getRoutines();
  if(!routines.length) return `<div class="empty"><div class="ico">📋</div><p>No hay rutinas creadas aún.</p></div>`;

  // calc total weekly vol across ALL routines
  const muscleVol={};
  routines.forEach(r=>{
    r.exercises.forEach(ex=>{
      const frac=FRACTIONAL[ex.pattern];
      if(!frac)return;
      Object.entries(frac).forEach(([muscle,mult])=>{
        muscleVol[muscle]=(muscleVol[muscle]||0)+((Array.isArray(ex.sets)?ex.sets.length:(parseInt(ex.sets)||0))*mult);
      });
    });
  });

  // sort by volume descending
  const sorted=Object.entries(muscleVol)
    .map(([muscle,val])=>({muscle,val:Math.round(val*10)/10}))
    .sort((a,b)=>b.val-a.val);

  const maxVal=sorted[0]?.val||1;

  // per-routine breakdown
  const routineBreakdowns=routines.map(r=>{
    const rv={};
    r.exercises.forEach(ex=>{
      const frac=FRACTIONAL[ex.pattern];
      if(!frac)return;
      Object.entries(frac).forEach(([muscle,mult])=>{
        rv[muscle]=(rv[muscle]||0)+((Array.isArray(ex.sets)?ex.sets.length:(parseInt(ex.sets)||0))*mult);
      });
    });
    return{name:r.name,vol:rv};
  });

  return`
    <div style="margin-bottom:12px">
      <div class="caption">Volumen total de todas tus rutinas activas, ordenado de mayor a menor.</div>
    </div>

    ${sorted.map(({muscle,val})=>{
      const row=DB_VOLUME.find(v=>v.muscle===muscle);
      const {cls,lbl,color}=volBadge(val,row);
      const pct=Math.round((val/maxVal)*100);
      const maint=row?row.maintenance:'—';
      const min=row?row.minEffective:'—';
      const adapt=row?row.maxAdaptive:'—';

      // per-routine contribution
      const contributions=routineBreakdowns
        .filter(rb=>rb.vol[muscle]>0)
        .map(rb=>`<span class="tag" style="font-size:10px">${rb.name}: ${Math.round(rb.vol[muscle]*10)/10}</span>`)
        .join('');

      return`
        <div class="card" style="margin-bottom:8px;padding:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="font-weight:600;font-size:14px;flex:1">${muscle}</div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:${color};line-height:1">${val}</div>
            <span class="week-calc-badge ${cls}" style="min-width:68px;text-align:center">${lbl||'Sin vol'}</span>
          </div>
          <div style="height:6px;background:var(--s3);border-radius:3px;margin-bottom:8px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .4s"></div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
            <span class="tag" style="font-size:10px">Mantenim: ${maint}</span>
            <span class="tag" style="font-size:10px">MEV: ${min}</span>
            <span class="tag" style="font-size:10px">MÁX adapt: ${adapt}</span>
          </div>
          ${contributions?`<div style="display:flex;gap:4px;flex-wrap:wrap">${contributions}</div>`:''}
        </div>
      `;
    }).join('')}

    <div class="card-sm" style="margin-top:4px">
      <div class="label" style="margin-bottom:6px">Leyenda de zonas</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:12px">
        <div><span class="week-calc-badge badge-maint">Mantenim</span> <span class="text-dim">— Conservas el músculo</span></div>
        <div><span class="week-calc-badge badge-min">Efectivo</span> <span class="text-dim">— Mínimo para crecer</span></div>
        <div><span class="week-calc-badge badge-adapt">Adaptativo</span> <span class="text-dim">— Zona óptima de crecimiento</span></div>
        <div><span class="week-calc-badge badge-max">Máx Rec</span> <span class="text-dim">— Límite de recuperación</span></div>
      </div>
    </div>
  `;
}

// WEEKLY VOLUME CALCULATOR
// ═══════════════════════════════════════════
function showWeekCalc(routineId){
  const routines=getRoutines();
  // calculate weekly vol for all selected routines
  // by default use all routines
  const muscleVol={};
  routines.forEach(r=>{
    r.exercises.forEach(ex=>{
      const fracEntry=FRACTIONAL[ex.pattern];
      if(!fracEntry)return;
      Object.entries(fracEntry).forEach(([muscle,mult])=>{
        muscleVol[muscle]=(muscleVol[muscle]||0)+((Array.isArray(ex.sets)?ex.sets.length:(parseInt(ex.sets)||0))*mult);
      });
    });
  });

  const rows=DB_VOLUME.filter(v=>v.maxAdaptive).map(v=>{
    const val=muscleVol[v.muscle]||0;
    const rounded=Math.round(val*10)/10;
    // parse ranges
    const maint=parseRange(v.maintenance);
    const min=parseRange(v.minEffective);
    const adapt=parseRange(v.maxAdaptive);
    const max=parseRange(v.maxRecoverable);
    let badge='',barColor='var(--muted)';
    if(max&&val>=max[0]){badge='badge-max';barColor='var(--danger)'}
    else if(adapt&&val>=adapt[0]){badge='badge-adapt';barColor='var(--warn)'}
    else if(min&&val>=min[0]){badge='badge-min';barColor='var(--ok)'}
    else if(maint&&val>=maint[0]){badge='badge-maint';barColor='#60a5fa'}
    const label=badge==='badge-max'?'Máx Rec':badge==='badge-adapt'?'Adaptativo':badge==='badge-min'?'Efectivo':badge==='badge-maint'?'Mantenim':'Bajo';
    const pct=adapt?Math.min(100,(val/(adapt[1]||adapt[0]))*100):0;
    return {muscle:v.muscle,val:rounded,badge,barColor,label,pct};
  }).sort((a,b)=>b.val-a.val);

  openModal('📊 Volumen Semanal',`
    <div class="caption" style="margin-bottom:14px">Basado en todas tus rutinas activas</div>
    <div class="week-calc">
      ${rows.map(r=>`
        <div class="week-calc-row">
          <div class="week-calc-muscle">${r.muscle}</div>
          <div class="week-calc-bar"><div class="week-calc-bar-fill" style="width:${r.pct}%;background:${r.barColor}"></div></div>
          <div class="week-calc-val" style="color:${r.barColor}">${r.val||'—'}</div>
          ${r.val?`<span class="week-calc-badge ${r.badge}">${r.label}</span>`:'<span style="font-size:10px;color:var(--muted)">Sin vol</span>'}
        </div>
      `).join('')}
    </div>
    <div class="card-sm" style="margin-top:12px">
      <div class="label" style="margin-bottom:6px">Leyenda</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:12px">
        <div><span class="week-calc-badge badge-maint">Mantenim</span> <span class="text-dim">— Mantienes el músculo</span></div>
        <div><span class="week-calc-badge badge-min">Efectivo</span> <span class="text-dim">— Mínimo para crecer</span></div>
        <div><span class="week-calc-badge badge-adapt">Adaptativo</span> <span class="text-dim">— Zona óptima de crecimiento</span></div>
        <div><span class="week-calc-badge badge-max">Máx Rec</span> <span class="text-dim">— Límite de recuperación</span></div>
      </div>
    </div>
  `);
}

function parseRange(str){
  if(!str)return null;
  const nums=str.match(/[\d.]+/g);
  if(!nums||!nums.length)return null;
  return [parseFloat(nums[0]),nums[1]?parseFloat(nums[1]):parseFloat(nums[0])+100];
}

function calcRoutineVolume(exercises){
  const muscleVol={};
  exercises.forEach(ex=>{
    const frac=FRACTIONAL[ex.pattern];
    if(!frac)return;
    const numSets=Array.isArray(ex.sets)?ex.sets.length:(parseInt(ex.sets)||0);
    Object.entries(frac).forEach(([muscle,mult])=>{
      muscleVol[muscle]=(muscleVol[muscle]||0)+(numSets*mult);
    });
  });
  return muscleVol;
}

function volBadge(val,row){
  if(!row||!row.maxAdaptive)return{cls:'',lbl:'—',color:'var(--muted)'};
  const maint=parseRange(row.maintenance);
  const min=parseRange(row.minEffective);
  const adapt=parseRange(row.maxAdaptive);
  const max=parseRange(row.maxRecoverable);
  if(max&&val>=max[0])return{cls:'badge-max',lbl:'Máx Rec',color:'var(--danger)'};
  if(adapt&&val>=adapt[0])return{cls:'badge-adapt',lbl:'Adaptativo',color:'var(--warn)'};
  if(min&&val>=min[0])return{cls:'badge-min',lbl:'Efectivo',color:'var(--ok)'};
  if(maint&&val>=maint[0])return{cls:'badge-maint',lbl:'Mantenim',color:'#60a5fa'};
  return{cls:'',lbl:'Bajo',color:'var(--muted)'};
}

function renderVolPanel(exercises){
  const vol=calcRoutineVolume(exercises);
  const entries=Object.entries(vol).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return`<div class="caption" style="color:var(--muted);text-align:center;padding:8px 0">Agrega ejercicios para ver el volumen</div>`;
  return entries.map(([muscle,val])=>{
    const rounded=Math.round(val*10)/10;
    const row=DB_VOLUME.find(v=>v.muscle===muscle);
    const {cls,lbl,color}=volBadge(val,row);
    const adapt=row?parseRange(row.maxAdaptive):null;
    const pct=adapt?Math.min(100,(val/adapt[1])*100):0;
    return`
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;width:110px;flex-shrink:0">${muscle}</div>
        <div style="flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .4s"></div>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${color};width:28px;text-align:right">${rounded}</div>
        <span class="week-calc-badge ${cls}" style="width:70px;text-align:center">${lbl}</span>
      </div>
    `;
  }).join('');
}

  return `
    <div class="builder-ex" id="bex-${ei}">
      <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
        <button class="btn-icon" style="width:28px;height:28px;font-size:14px;${ei===0?'opacity:.25;pointer-events:none':''}"
          onclick="builderMoveEx(${ei},${ei-1})">▲</button>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);text-align:center;line-height:1.2">${ei+1}</div>
        <button class="btn-icon" style="width:28px;height:28px;font-size:14px;${ei===total-1?'opacity:.25;pointer-events:none':''}"
          onclick="builderMoveEx(${ei},${ei+1})">▼</button>
      </div>
      <div class="builder-ex-body">
        <div class="builder-ex-name">${ex.name}</div>
        <div class="builder-ex-meta">${ex.pattern}</div>
        <div class="builder-ex-controls">
          <span class="caption">Series:</span>

          <span class="caption">Reps:</span>
          <input type="text" value="${ex.reps||'10-12'}" style="width:70px" onchange="builderSetEx(${ei},'reps',this.value)"/>

          <span class="caption">Descanso:</span>
          <input type="text" value="${fmtRest(ex.rest||90)}" style="width:80px" placeholder="ej: 1min30s"

            onblur="this.value=fmtRest(parseRest(this.value))"/>

          <input type="text" value="${ex.rir||''}" style="width:80px" placeholder="ej: RIR 1-2"

// ── REORDER ──
let _dragSrcIdx=null;

function builderSetColor(color){
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(!r)return;
  r.color=color;
  saveRoutines(routines);
  document.querySelectorAll('[id^="swatch-"]').forEach(el=>{
    const c='#'+el.id.replace('swatch-','');
    el.style.border=`3px solid ${c===color?'#fff':'transparent'}`;
    el.style.boxShadow=c===color?`0 0 0 2px ${c}`:'none';
  });
}

function builderMoveEx(fromIdx,toIdx){
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(!r)return;
  const item=r.exercises.splice(fromIdx,1)[0];
  r.exercises.splice(toIdx,0,item);
  saveRoutines(routines);
  // re-render just the list
  const list=document.getElementById('builder-ex-list');
  if(list) list.innerHTML=r.exercises.map((ex,ei)=>builderExHTML(ex,ei)).join('');
  const panel=document.getElementById('builder-vol-panel');
  if(panel) panel.innerHTML=renderVolPanel(r.exercises);
}

function builderUpdate(field,val){
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(r){r[field]=val;saveRoutines(routines);}
}

function builderSetEx(ei,field,val){
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(r&&r.exercises[ei]){r.exercises[ei][field]=val;saveRoutines(routines);}
}

function builderSetExLive(ei,field,val){
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(r&&r.exercises[ei]){
    r.exercises[ei][field]=val;
    saveRoutines(routines);
    // update vol panel in place without full re-render
    const panel=document.getElementById('builder-vol-panel');
    if(panel)panel.innerHTML=renderVolPanel(r.exercises);
  }
}

function builderRemoveEx(ei){
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(r){r.exercises.splice(ei,1);saveRoutines(routines);editRoutine(builderRoutineId);}
}

// Store picker list in memory to avoid re-escaping issues
let _pickerList=[];
let _pickerCurrentMuscle='';

function builderAddEx(){
  _pickerList=getAllExercises().sort((a,b)=>a.name.localeCompare(b.name));
  _pickerCurrentMuscle='';
  const muscles=[...new Set(_pickerList.flatMap(e=>e.muscles))].sort();
  openModal('Seleccionar ejercicio',`
    <div class="search-wrap" style="margin-bottom:8px">
      <span class="search-icon">🔍</span>
      <input class="input" id="picker-search" placeholder="Buscar..." oninput="filterPicker()"/>
    </div>
    <div class="pill-scroll" id="picker-pills">
      <div class="pill on" onclick="filterPicker('')">Todos</div>
      ${muscles.map(m=>`<div class="pill" onclick="filterPicker('${m}')">${m}</div>`).join('')}
    </div>
    <div id="picker-list" style="max-height:50vh;overflow-y:auto">
      ${_pickerList.map((ex,i)=>`
        <div class="ex-item" style="cursor:pointer" onclick="pickExByIdx(${i})">
          <div class="ex-item-body">
            <div class="ex-item-name">${ex.name}</div>
            <div class="ex-item-sub">${ex.muscles.join(', ')} · ${ex.pattern}</div>
          </div>
          <span style="color:var(--accent);font-size:20px">+</span>
        </div>
      `).join('')}
    </div>
  `);
}

function pickExByIdx(i){
  const ex=_pickerList[i];
  if(!ex)return;
  const routines=getRoutines();
  const r=routines.find(x=>x.id===builderRoutineId);
  if(!r)return;
  r.exercises.push({
    name:ex.name,pattern:ex.pattern,muscles:ex.muscles,
    sets:3,reps:'10-12',rest:90,note:'',url:ex.url||''
  });
  saveRoutines(routines);
  editRoutine(builderRoutineId);
}

function filterPicker(val){
  // use stored _pickerList, don't reset it
  const search=document.getElementById('picker-search')?.value.toLowerCase()||'';
  const muscle=val!==undefined?(val&&val!=='Todos'?val:''):null;
  // if val is undefined, it was called from the search input — preserve current muscle filter
  const currentMuscle=muscle!==null?muscle:(_pickerCurrentMuscle||'');
  if(muscle!==null)_pickerCurrentMuscle=currentMuscle;

  const filtered=_pickerList.filter(e=>{
    const matchM=!currentMuscle||e.muscles.includes(currentMuscle);
    const matchS=!search||e.name.toLowerCase().includes(search);
    return matchM&&matchS;
  });
  const list=document.getElementById('picker-list');
  if(!list)return;
  list.innerHTML=filtered.map(ex=>{
    const i=_pickerList.indexOf(ex);
    return`
      <div class="ex-item" style="cursor:pointer" onclick="pickExByIdx(${i})">
        <div class="ex-item-body">
          <div class="ex-item-name">${ex.name}</div>
          <div class="ex-item-sub">${ex.muscles.join(', ')} · ${ex.pattern}</div>
        </div>
        <span style="color:var(--accent);font-size:20px">+</span>
      </div>
    `;
  }).join('');
  if(muscle!==null){
    document.querySelectorAll('#picker-pills .pill').forEach(p=>{
      p.classList.toggle('on',p.textContent.trim()===(currentMuscle||'Todos'));
    });
  }
}

function saveBuilder(){
  closeModal();
  renderRoutines();
}

function deleteRoutine(id){
  if(!confirm('¿Eliminar esta rutina?'))return;
  const routines=getRoutines().filter(r=>r.id!==id);
  saveRoutines(routines);
  closeModal();
  renderRoutines();
}

function openExport(){
  const data={
    sessions:getSessions(),
    routines:getRoutines(),
    customExercises:getCustomExercises(),
    exportDate:new Date().toISOString(),
    version:'2.0'
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`gymtrack-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function openImport(){
  openModal('📥 Importar datos',`
    <div style="font-size:13px;color:var(--dim);margin-bottom:14px;line-height:1.6">
      Selecciona un archivo de backup (.json) exportado desde GymTrack.<br>
      <strong style="color:var(--warn)">⚠️ Esto reemplazará tus datos actuales.</strong>
    </div>
    <input type="file" accept=".json" id="import-file" class="input" style="padding:8px"/>
    <button class="btn btn-primary" style="margin-top:10px" onclick="doImport()">Importar</button>
  `);
}

function doImport(){
  const file=document.getElementById('import-file')?.files[0];
  if(!file){alert('Selecciona un archivo primero');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Validate — must have at least one recognizable key
      if(!data||typeof data!=='object'){throw new Error('invalid');}
      let imported=0;
      if(Array.isArray(data.sessions)&&data.sessions.length>=0){
        save('gt_sessions',data.sessions);imported++;
      }
      if(Array.isArray(data.routines)&&data.routines.length>0){
        save('gt_routines',data.routines);imported++;
      }
      if(Array.isArray(data.customExercises)){
        saveCustomExercises(data.customExercises);imported++;
      }
      if(imported===0)throw new Error('no recognizable data');
      closeModal();
      // force re-render after a tick to ensure localStorage is flushed
      setTimeout(()=>{
        currentScreen='home';
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
        document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
        document.getElementById('sc-home').classList.add('on');
        document.getElementById('nb-home').classList.add('active');
        renderHome();
        alert('✅ Datos importados correctamente');
      },50);
    }catch(err){
      alert('❌ Archivo inválido o corrupto. Asegúrate de usar un backup exportado desde GymTrack.');
    }
  };
  reader.readAsText(file);
}

function openModal(title,html){
  document.getElementById('modal-body').innerHTML=`<div class="modal-title">${title}</div>${html}`;
  document.getElementById('modal-overlay').classList.add('on');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.remove('on');
}

// UTILS

function fmtRest(sec){
  if(!sec||sec<60) return `${sec||0}s`;
  const m=Math.floor(sec/60), s=sec%60;
  return s>0?`${m}min ${s}s`:`${m}min`;
}

function parseRest(str){
  // accepts: "90", "90s", "1min", "1min30s", "1:30", "2"
  str=str.trim().toLowerCase();
  const minSec=str.match(/(\d+)\s*min\s*(\d+)?\s*s?/);
  if(minSec) return parseInt(minSec[1])*60+(parseInt(minSec[2])||0);
  const colonFmt=str.match(/^(\d+):(\d+)$/);
  if(colonFmt) return parseInt(colonFmt[1])*60+parseInt(colonFmt[2]);
  const onlyMin=str.match(/^(\d+)\s*min$/);
  if(onlyMin) return parseInt(onlyMin[1])*60;
  return parseInt(str)||90;
}
function fmtTimer(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),sec=s%60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
